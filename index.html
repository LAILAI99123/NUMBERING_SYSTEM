<script>
const $=s=>document.querySelector(s);const $$=s=>Array.from(document.querySelectorAll(s));
const state={step:0,select:0,returnTarget:null,riskLevel:null,amount:'',tab:'overview',seed:String(Date.now()).slice(-6),hist:{loaded:false,counts:{},rawCount:0},toggles:{toto:true,magnum:true,damacai:true,big:true,small:true,supreme:true,power:true,star:true},custom:'',exclude:'',result:null,lastReport:''};
const steps=[['Return target','Select high, medium, or low return.'],['Risk level','Control concentration and spread.'],['Bet amount','Enter total budget in RM.'],['Plan output','Review full detail and export.']];
const returns=[{k:'high',name:'High return',tag:'Aggressive payout',desc:'More allocation to jackpot and small payout modules.'},{k:'medium',name:'Medium return',tag:'Balanced',desc:'Balanced split between 4D coverage and jackpot lines.'},{k:'low',name:'Low return',tag:'Coverage first',desc:'More allocation to wider 4D coverage and fewer jackpot lines.'}];
const risks=[{k:'high',name:'High risk',tag:'Focused',desc:'Fewer numbers or lines, higher concentration per selected item.'},{k:'medium',name:'Medium risk',tag:'Balanced',desc:'Moderate number of items and stable distribution.'},{k:'low',name:'Low risk',tag:'Spread',desc:'More numbers or lines, smaller bet amount per selected item.'}];

function hash(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){let a=hash(seed);return function(){a+=0x6D2B79F5;let t=a;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296}}
function pad4(n){return String(n).padStart(4,'0')}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function title(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'-'}
function selectedCompanies(){return ['toto','magnum','damacai'].filter(x=>state.toggles[x])}
function selectedModules(){return ['big','small','supreme','power','star'].filter(x=>state.toggles[x])}
function parseList(s){return (s||'').match(/\d{4}/g)||[]}
function tokenizeHist(text){const nums=text.match(/\b\d{4}\b/g)||[];nums.forEach(n=>state.hist.counts[n]=(state.hist.counts[n]||0)+1);state.hist.rawCount+=nums.length;state.hist.loaded=state.hist.rawCount>0}
function weights(){const fav=new Set(parseList(state.custom));const excl=new Set(parseList(state.exclude));let out=[];for(let i=0;i<10000;i++){let n=pad4(i),d=n.split('').map(Number),w=1;if(excl.has(n)){w=0}else{let uniq=new Set(d).size;if(uniq===1)w+=8;else if(uniq===2)w+=3;if(n[0]===n[3]&&n[1]===n[2])w+=4;let sum=d.reduce((a,b)=>a+b,0);if(sum>=14&&sum<=24)w+=2;if(/(168|688|888|999|000|123|789)/.test(n))w+=3;if(fav.has(n))w+=18;if(state.hist.loaded)w+=(state.hist.counts[n]||0)*4;w+=((hash(n+state.seed)%100)/100)*1.6}out.push([n,w])}return out}
function weightedPick(count,seed){const r=rng(seed);let arr=weights().filter(x=>x[1]>0),picked=[];count=Math.min(count,arr.length);for(let c=0;c<count;c++){let total=arr.reduce((a,b)=>a+b[1],0);let roll=r()*total,acc=0,idx=0;for(;idx<arr.length;idx++){acc+=arr[idx][1];if(acc>=roll)break}picked.push(arr[idx][0]);arr.splice(idx,1)}return picked}
function randLine(max,seed){const r=rng(seed);let set=new Set();while(set.size<6)set.add(1+Math.floor(r()*max));return Array.from(set).sort((a,b)=>a-b).map(n=>String(n).padStart(2,'0')).join(' ')}
function normalize(obj){let enabled=Object.fromEntries(Object.entries(obj).filter(([k,v])=>state.toggles[k]&&v>0));let sum=Object.values(enabled).reduce((a,b)=>a+b,0);if(sum<=0)return {};Object.keys(enabled).forEach(k=>enabled[k]/=sum);return enabled}
function allocationProfile(rt,rl){let m={big:0,small:0,supreme:0,power:0,star:0};if(rt==='high'){m={big:.18,small:.22,supreme:.28,power:.18,star:.14}}else if(rt==='medium'){m={big:.38,small:.20,supreme:.16,power:.14,star:.12}}else{m={big:.62,small:.13,supreme:.08,power:.08,star:.09}}if(rl==='high'){m.big-=.08;m.small+=.05;m.supreme+=.05;m.power+=.02;m.star-=.04}else if(rl==='low'){m.big+=.12;m.small-=.04;m.supreme-=.05;m.power-=.02;m.star-=.01}Object.keys(m).forEach(k=>m[k]=clamp(m[k],0,.8));return normalize(m)}
function companyProfile(rl){let obj={toto:rl==='high'?.50:rl==='low'?.34:.40,magnum:rl==='high'?.25:rl==='low'?.33:.30,damacai:rl==='high'?.25:rl==='low'?.33:.30};let enabled=Object.fromEntries(Object.entries(obj).filter(([k])=>state.toggles[k]));let sum=Object.values(enabled).reduce((a,b)=>a+b,0)||1;Object.keys(enabled).forEach(k=>enabled[k]/=sum);return enabled}
function distribute(total,keys,unit=1){total=Math.floor(total);let base=Object.fromEntries(keys.map(k=>[k,0]));if(keys.length===0)return base;for(let i=0;i<total;i+=unit){base[keys[(i/unit)%keys.length]]+=unit}return base}
function calcPlan(){let amount=Math.floor(Number(state.amount)||0);let profile=allocationProfile(state.returnTarget,state.riskLevel);let moduleAmounts={};let used=0;Object.entries(profile).forEach(([k,p])=>{moduleAmounts[k]=Math.floor(amount*p);used+=moduleAmounts[k]});let remainder=amount-used;if(remainder>0){let pref=state.toggles.big?'big':Object.keys(profile)[0];moduleAmounts[pref]=(moduleAmounts[pref]||0)+remainder}
 let jackpotLines=[],jackpotActual=0,jackpotLeftover=0;['supreme','power','star'].forEach(g=>{let budget=moduleAmounts[g]||0,cost=games[g].cost,lines=Math.floor(budget/cost);let spent=lines*cost;jackpotActual+=spent;jackpotLeftover+=budget-spent;for(let i=1;i<=lines;i++){jackpotLines.push({game:g,gameName:games[g].name,lineNo:i,numbers:randLine(games[g].max,`${state.seed}-${g}-${i}-${state.returnTarget}-${state.riskLevel}`),cost})}});if(jackpotLeftover>0){moduleAmounts.big=(moduleAmounts.big||0)+jackpotLeftover}
 let companies=selectedCompanies(),companyShare=companyProfile(state.riskLevel);let bigBudget=moduleAmounts.big||0,smallBudget=moduleAmounts.small||0;let riskFactor=state.riskLevel==='high'?9:state.riskLevel==='medium'?6:3;let targetNumCount=Math.max(6,Math.min(80,Math.floor((bigBudget+smallBudget)/riskFactor)||6));let nums=weightedPick(targetNumCount,`${state.seed}-${amount}-${state.returnTarget}-${state.riskLevel}-${state.custom}-${state.exclude}-${state.hist.rawCount}`);
 let fourD=[];let add4D=(play,budget)=>{if(!state.toggles[play]||budget<=0||companies.length===0)return;Object.entries(companyShare).forEach(([co,share])=>{let b=Math.floor(budget*share),keys=nums.map((n,i)=>`${i}`),dist=distribute(b,keys,1);nums.forEach((n,i)=>{let bet=dist[String(i)]||0;if(bet>0)fourD.push({company:co.toUpperCase(),number:n,play:play.toUpperCase(),betAmount:bet,unit:'RM1 unit',reason:reasonFor(n)})})})};
 add4D('big',bigBudget);add4D('small',smallBudget);let actualSpend=fourD.reduce((a,b)=>a+b.betAmount,0)+jackpotActual;let unallocated=amount-actualSpend;return {amount,profile,moduleAmounts,jackpotActual,jackpotLeftover,jackpotLines,fourD,actualSpend,unallocated,companyShare,nums,created:new Date().toLocaleString()}}
function reasonFor(n){let d=n.split('').map(Number),sum=d.reduce((a,b)=>a+b,0);let notes=[];if(new Set(d).size<=2)notes.push('pattern');if(n[0]===n[3]&&n[1]===n[2])notes.push('mirror');if(sum>=14&&sum<=24)notes.push('balanced sum');if(state.hist.loaded && state.hist.counts[n])notes.push('Hist500 seen '+state.hist.counts[n]);if(parseList(state.custom).includes(n))notes.push('player focus');return notes.join(', ')||'weighted system pick'}
function renderSteps(){let el=$('#steps');el.innerHTML=steps.map((s,i)=>`<div class="step ${state.step===i?'active':''} ${state.step>i?'done':''}"><div class="stepDot">${state.step>i?'✓':i+1}</div><div><div class="stepName">${s[0]}</div><div class="stepDesc">${s[1]}</div></div></div>`).join('')}
function renderMonitor(){let stepNames=['Wizard','Wizard','Input','Result'];$('#monMode').textContent=stepNames[state.step]||'Wizard';$('#monReturn').textContent=title(state.returnTarget);$('#monRisk').textContent=title(state.riskLevel);$('#monAmount').textContent=fmt(Number(state.amount)||0);$('#monHist').textContent=state.hist.loaded?`${state.hist.rawCount} numbers`:'Not loaded';$('#monSeed').textContent=state.seed;$('#stateChip').textContent=state.step===3?'OUTPUT':'READY'}
function renderSettings(){let t=state.toggles;$('#settingsPanel').innerHTML=`<div class="settingsGrid">
<div class="setting"><div class="settingTop"><b>Provider switch</b><span class="tag blue">Active ${selectedCompanies().length}</span></div><div class="toggleRow">${['toto','magnum','damacai'].map(k=>`<button class="toggle ${t[k]?'on':''}" data-toggle="${k}">${k.toUpperCase()}</button>`).join('')}</div></div>
<div class="setting"><div class="settingTop"><b>Module switch</b><span class="tag purple">Deep</span></div><div class="toggleRow">${['big','small','supreme','power','star'].map(k=>`<button class="toggle ${t[k]?'on':''}" data-toggle="${k}">${k.toUpperCase()}</button>`).join('')}</div><div class="smallText" style="margin-top:9px">Jackpot modules use fixed unit pricing. Supreme RM2 per line; Power and Star RM1 per line.</div></div>
<div class="setting"><div class="settingTop"><b>Seed control</b><span class="tag">Reproducible</span></div><input class="miniInput" id="seedInput" value="${state.seed}" placeholder="Seed" /><div class="smallText" style="margin-top:9px"><b>Desc:</b> Seed is the plan ID used by the engine. Same seed + same settings generates the same numbering plan. Change the seed, or press Regenerate, to create a different plan. Seed affects only system suggestions; it does not affect any official result.</div></div>
<div class="setting"><div class="settingTop"><b>Focus numbers</b><span class="tag green">Boost</span></div><textarea class="textarea" id="customInput" placeholder="Example: 1234, 8888, 1688">${state.custom}</textarea><div class="smallText" style="margin-top:9px">Enter 4-digit numbers separated by comma, space, or new line. These numbers receive higher recommendation weight.</div></div>
<div class="setting"><div class="settingTop"><b>Exclude numbers</b><span class="tag orange">Block</span></div><textarea class="textarea" id="excludeInput" placeholder="Example: 0000, 9999">${state.exclude}</textarea><div class="smallText" style="margin-top:9px">Enter numbers you do not want the system to recommend. Matching 4-digit values are blocked from weighted picks.</div></div>
<div class="setting"><div class="fileBox" id="fileBox">Import Hist500 CSV/TXT</div><div class="smallText" style="margin-top:9px">The system scans 4-digit values from your file and uses them as weighting input.</div></div>
<div class="setting"><button class="btn dark" style="width:100%" id="saveSession">Save session</button><button class="btn" style="width:100%;margin-top:8px" id="loadSession">Load session</button><div class="smallText" style="margin-top:9px">CMD-style global shortcuts are disabled while typing in Seed, Focus numbers, Exclude numbers, or Bet amount fields.</div><div class="miniStat"><span>Input safety</span><b>ON</b></div><div class="miniStat"><span>GitHub Pages</span><b>READY</b></div></div>
</div>`;
$$('[data-toggle]').forEach(b=>b.onclick=()=>{let k=b.dataset.toggle;state.toggles[k]=!state.toggles[k];if(['big','small','supreme','power','star'].includes(k)&&!selectedModules().length)state.toggles[k]=true;if(['toto','magnum','damacai'].includes(k)&&!selectedCompanies().length)state.toggles[k]=true;renderAll();});['seedInput','customInput','excludeInput'].forEach(id=>{let el=$('#'+id);if(el){el.addEventListener('keydown',ev=>ev.stopPropagation());el.addEventListener('keyup',ev=>ev.stopPropagation());el.addEventListener('click',ev=>ev.stopPropagation());}});$('#seedInput').oninput=e=>{state.seed=e.target.value||'1';renderMonitor()};$('#customInput').oninput=e=>state.custom=e.target.value;$('#excludeInput').oninput=e=>state.exclude=e.target.value;$('#customInput').onblur=e=>{state.custom=normalizeNumberList(e.target.value);e.target.value=state.custom};$('#excludeInput').onblur=e=>{state.exclude=normalizeNumberList(e.target.value);e.target.value=state.exclude};$('#fileBox').onclick=()=>$('#histFile').click();$('#saveSession').onclick=saveSession;$('#loadSession').onclick=loadSession}
function choiceHTML(kind){let data=kind==='return'?returns:risks;let title=kind==='return'?'Select return target':'Select risk level';let sub=kind==='return'?'Pick the output style you want the system to optimize around.':'Pick how concentrated or spread out the plan should be.';return `<div class="card fadeIn"><h2 class="screenTitle">${title}</h2><p class="screenSub">${sub}</p><div class="choiceGrid">${data.map((x,i)=>`<div class="choice ${state.select===i?'sel':''}" data-pick="${i}"><div class="choiceTag">${x.tag}</div><div class="choiceNum">${i+1}</div><div class="choiceName">${x.name}</div><div class="choiceDesc">${x.desc}</div></div>`).join('')}</div><div class="actions"><button class="btn primary" id="confirmBtn">Continue</button>${state.step>0?'<button class="btn" id="backBtn">Back</button>':''}</div></div>`}
function amountHTML(){return `<div class="card fadeIn"><h2 class="screenTitle">Enter bet amount</h2><p class="screenSub">The engine will convert your total budget into provider allocation, 4D bet amount, and fixed jackpot line units.</p><div class="amountRow"><div class="currency">RM</div><input class="amountInput num" id="amountInput" inputmode="numeric" placeholder="500" value="${state.amount}" autofocus /></div><div class="quick"><button data-amt="20">RM20</button><button data-amt="50">RM50</button><button data-amt="100">RM100</button><button data-amt="300">RM300</button><button data-amt="500">RM500</button><button data-amt="1000">RM1000</button></div><div class="notice" style="margin-top:18px">Reference only. This system controls only how suggestions are generated and distributed. It does not control actual results.</div><div class="actions"><button class="btn primary" id="generateBtn">Generate full plan</button><button class="btn" id="backBtn">Back</button></div></div>`}
function buildReport(p){let lines=[];lines.push('HANDSOME LAI HENGHENG NUMBERING SYSTEM V2.9');lines.push('FULL DETAIL REPORT');lines.push('='.repeat(72));lines.push(`Created        : ${p.created}`);lines.push(`Return target  : ${title(state.returnTarget)}`);lines.push(`Risk level     : ${title(state.riskLevel)}`);lines.push(`Total amount   : ${fmt(p.amount)}`);lines.push(`Actual spend   : ${fmt(p.actualSpend)}`);lines.push(`Unallocated    : ${fmt(p.unallocated)}`);lines.push(`Seed           : ${state.seed}`);let hh=planHealth(p);lines.push(`Plan health    : ${hh.overall}% / ${hh.status}`);lines.push(`Providers      : ${selectedCompanies().map(x=>x.toUpperCase()).join(', ')}`);lines.push(`Modules        : ${selectedModules().map(x=>x.toUpperCase()).join(', ')}`);lines.push(`Hist500        : ${state.hist.loaded?state.hist.rawCount+' numbers loaded':'Not loaded'}`);lines.push('');lines.push('AMOUNT ALLOCATION');Object.entries(p.moduleAmounts).forEach(([k,v])=>lines.push(`${k.toUpperCase().padEnd(10)} : ${fmt(v)}`));lines.push(`JACKPOT ACTUAL : ${fmt(p.jackpotActual)}`);lines.push('');lines.push('4D BET AMOUNT LEDGER');p.fourD.forEach((x,i)=>lines.push(`${String(i+1).padStart(3,'0')} | ${x.company.padEnd(7)} | ${x.number} | ${x.play.padEnd(5)} | ${fmt(x.betAmount).padEnd(8)} | ${x.reason}`));lines.push('');lines.push('JACKPOT FULL LINE LIST');p.jackpotLines.forEach((x,i)=>lines.push(`${String(i+1).padStart(3,'0')} | ${x.gameName.padEnd(19)} | LINE ${String(x.lineNo).padStart(3,'0')} | ${x.numbers} | ${fmt(x.cost)}`));lines.push('');lines.push('NOTE: Reference only. No guaranteed outcome.');state.lastReport=lines.join('\n');return state.lastReport}
function bar(label,val,total,cls=''){let pct=total?Math.round(val/total*100):0;return `<div class="barRow"><div class="barLabel">${label}</div><div class="barTrack"><span class="barFill ${cls}" style="width:${clamp(pct,0,100)}%"></span></div><div class="barValue num">${pct}%</div></div>`}
function planHealth(p){let spendPct=p.amount?Math.round(p.actualSpend/p.amount*100):0;let providerCount=selectedCompanies().length;let moduleCount=selectedModules().length;let dataPct=state.hist.loaded?100:35;let spreadIndex=clamp(Math.round((providerCount/3*35)+(moduleCount/5*35)+(p.fourD.length>0?15:0)+(p.jackpotLines.length>0?15:0)),0,100);let unitIndex=clamp(Math.round((p.unallocated<=Math.max(1,p.amount*.03)?100:80) - (p.unallocated>p.amount*.1?25:0)),0,100);let overall=clamp(Math.round(spendPct*.35+spreadIndex*.30+unitIndex*.20+dataPct*.15),0,100);let status=overall>=80?'Strong':overall>=60?'Stable':'Needs review';return {overall,status,spendPct,providerCount,moduleCount,dataPct,spreadIndex,unitIndex}}
function healthHTML(p){let h=planHealth(p);return `<div class="card"><div class="sectionHead"><h2>Plan health dashboard</h2><p>System checks before using the generated plan</p></div><div class="healthGrid"><div class="healthCard"><div class="healthTitle">Health index</div><div class="healthValue num">${h.overall}%</div><div class="healthNote">${h.status}</div></div><div class="healthCard"><div class="healthTitle">Budget usage</div><div class="healthValue num">${h.spendPct}%</div><div class="healthNote">Actual spend vs total amount</div></div><div class="healthCard"><div class="healthTitle">Providers</div><div class="healthValue num">${h.providerCount}/3</div><div class="healthNote">Active provider coverage</div></div><div class="healthCard"><div class="healthTitle">Modules</div><div class="healthValue num">${h.moduleCount}/5</div><div class="healthNote">Active play modules</div></div></div><div class="chart" style="margin-top:16px">${bar('OVERALL HEALTH',h.overall,100,'green')}${bar('SPREAD CONTROL',h.spreadIndex,100,'blue')}${bar('UNIT CONTROL',h.unitIndex,100,'orange')}${bar('DATA READINESS',h.dataPct,100,'purple')}</div></div>`}
function auditHTML(p){let h=planHealth(p);let focus=parseList(state.custom),exclude=parseList(state.exclude);let data=[['Version','V2.9 Dark Luxury Lounge System / Plan health engine'],['Return target',title(state.returnTarget)],['Risk level',title(state.riskLevel)],['Total amount',fmt(p.amount)],['Actual spend',fmt(p.actualSpend)],['Unallocated reserve',fmt(p.unallocated)],['Seed control',state.seed+' · same seed and same settings generate the same plan'],['Active providers',selectedCompanies().map(x=>x.toUpperCase()).join(', ')||'None'],['Active modules',selectedModules().map(x=>x.toUpperCase()).join(', ')||'None'],['Focus numbers',focus.length?focus.join(', '):'None'],['Exclude numbers',exclude.length?exclude.join(', '):'None'],['Hist500 data',state.hist.loaded?state.hist.rawCount+' scanned 4-digit values':'Not loaded'],['Plan health',h.overall+'% · '+h.status],['Unit rule','Supreme uses RM2 per line. Power and Star use RM1 per line. 4D entries are RM1 unit allocations.']];return `<div class="sectionHead"><h2>System audit trail</h2><p>Transparent settings and validation record</p></div><div class="${h.overall>=70?'okBox':'warnBox'}">${h.overall>=70?'Plan passed normal system checks.':'Plan generated, but the health index suggests review before sharing.'} This is a recommendation and allocation system only.</div><div class="card" style="margin-top:16px"><div class="auditList">${data.map(x=>`<div class="auditItem"><div class="auditKey">${x[0]}</div><div class="auditVal">${x[1]}</div></div>`).join('')}</div></div>`}

function resultHTML(){let p=state.result;if(!p){return '<div class="card"><h2 class="screenTitle">No plan yet</h2></div>'}let tabs=['overview','ledger','jackpot','analysis','compare','audit','import'];let body='';let totalMod=Object.values(p.moduleAmounts).reduce((a,b)=>a+b,0)||1;if(state.tab==='overview'){body=`<div class="summaryGrid"><div class="metric blue"><div class="metricLabel">Total amount</div><div class="metricValue num">${fmt(p.amount)}</div></div><div class="metric green"><div class="metricLabel">Actual spend</div><div class="metricValue num">${fmt(p.actualSpend)}</div></div><div class="metric orange"><div class="metricLabel">4D entries</div><div class="metricValue num">${p.fourD.length}</div></div><div class="metric purple"><div class="metricLabel">Jackpot lines</div><div class="metricValue num">${p.jackpotLines.length}</div></div></div><div class="card" style="margin-top:18px"><div class="sectionHead"><h2>Decision summary</h2><p>Automatic plan from current profile</p></div><div class="chart">${Object.entries(p.moduleAmounts).map(([k,v],i)=>bar(k.toUpperCase(),v,totalMod,['','green','orange','purple'][i%4])).join('')}${bar('JACKPOT ACTUAL',p.jackpotActual,p.amount,'purple')}</div></div>${healthHTML(p)}<div class="notice">Full detail is available under Ledger, Jackpot, Analysis, and Audit tabs. Copy, export, or print from the action buttons below.</div>`}

if(state.tab==='import'){body=`<div class="sectionHead"><h2>Data and settings</h2><p>Deep controls for this static app.</p></div><div class="card"><div class="fileBox" onclick="document.querySelector('#histFile').click()">Import Hist500 CSV/TXT now</div><p class="smallText">Imported 4-digit values increase weight for matching numbers in future generated plans.</p></div><div class="card"><div class="sectionHead"><h2 style="font-size:22px">Shareable configuration</h2><p>Generate URL with current setup</p></div><button class="btn primary" onclick="shareConfig()">Create share URL</button><button class="btn" onclick="resetData()">Reset imported data</button></div>`}
return `<div class="card fadeIn"><div class="sectionHead"><div><h2 class="screenTitle">Full detail plan generated</h2><p class="screenSub">${title(state.returnTarget)} return · ${title(state.riskLevel)} risk · ${fmt(p.amount)}</p></div></div><div class="tabs">${tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" data-tab="${t}">${t.toUpperCase()}</button>`).join('')}</div>${body}<div class="actions"><button class="btn primary" id="copyBtn">Copy report</button><button class="btn" id="exportBtn">Export TXT</button><button class="btn" id="jsonBtn">Export JSON</button><button class="btn" id="printBtn">Print</button><button class="btn warn" id="regenBtn">Regenerate</button><button class="btn" id="newBtn">New</button></div></div>`}
function compareHTML(){let amount=Math.floor(Number(state.amount)||0),oldR=state.returnTarget,oldRisk=state.riskLevel;let rows=[];['high','medium','low'].forEach(r=>['high','medium','low'].forEach(k=>{state.returnTarget=r;state.riskLevel=k;let p=calcPlan();rows.push({ret:r,risk:k,big:p.moduleAmounts.big||0,small:p.moduleAmounts.small||0,jp:p.jackpotActual,lines:p.jackpotLines.length,entries:p.fourD.length,spend:p.actualSpend})}));state.returnTarget=oldR;state.riskLevel=oldRisk;return `<div class="sectionHead"><h2>Strategy comparison</h2><p>Same amount across 9 profiles</p></div><div class="tableWrap"><table class="table"><thead><tr><th>Return</th><th>Risk</th><th>4D Big</th><th>4D Small</th><th>Jackpot actual</th><th>Jackpot lines</th><th>4D entries</th><th>Spend</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${title(x.ret)}</td><td>${title(x.risk)}</td><td>${fmt(x.big)}</td><td>${fmt(x.small)}</td><td>${fmt(x.jp)}</td><td>${x.lines}</td><td>${x.entries}</td><td>${fmt(x.spend)}</td></tr>`).join('')}</tbody></table></div>`}
function renderScreen(){let html='';if(state.step===0)html=choiceHTML('return');if(state.step===1)html=choiceHTML('risk');if(state.step===2)html=amountHTML();if(state.step===3)html=resultHTML();$('#screen').innerHTML=html;$$('[data-pick]').forEach(e=>e.onclick=()=>{state.select=Number(e.dataset.pick);confirmStep()});$('#confirmBtn')?.addEventListener('click',confirmStep);$('#backBtn')?.addEventListener('click',back);$('#generateBtn')?.addEventListener('click',generate);$$('[data-amt]').forEach(b=>b.onclick=()=>{state.amount=b.dataset.amt;renderAll();setTimeout(()=>$('#amountInput')?.focus(),0)});$('#amountInput')?.addEventListener('input',e=>{state.amount=e.target.value.replace(/[^0-9]/g,'');renderMonitor()});$$('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;renderAll()});$('#copyBtn')?.addEventListener('click',copyReport);$('#exportBtn')?.addEventListener('click',exportTxt);$('#jsonBtn')?.addEventListener('click',exportJson);$('#printBtn')?.addEventListener('click',()=>window.print());$('#regenBtn')?.addEventListener('click',()=>{state.seed=String(Date.now()).slice(-8);generate(true)});$('#newBtn')?.addEventListener('click',newGame)}
function renderAll(){renderSteps();renderMonitor();renderSettings();renderScreen()}
function confirmStep(){if(state.step===0){state.returnTarget=returns[state.select].k;state.step=1;state.select=0}else if(state.step===1){state.riskLevel=risks[state.select].k;state.step=2;state.select=0}else if(state.step===2){generate()}renderAll();setTimeout(()=>$('#amountInput')?.focus(),0)}
function back(){if(state.step>0){state.step--;state.select=0;renderAll()}}
function generate(silent=false){let val=Number(state.amount);if(!val||val<1){toast('Enter a valid amount');return}if(!state.returnTarget)state.returnTarget='medium';if(!state.riskLevel)state.riskLevel='medium';state.result=calcPlan();state.step=3;state.tab='overview';buildReport(state.result);renderAll();if(!silent)toast('Full detail plan generated')}
function newGame(){state.step=0;state.select=0;state.returnTarget=null;state.riskLevel=null;state.amount='';state.result=null;state.tab='overview';renderAll()}
function copyReport(){if(!state.result)return;buildReport(state.result);navigator.clipboard?.writeText(state.lastReport).then(()=>toast('Report copied')).catch(()=>toast('Copy not available'))}
function exportTxt(){if(!state.result)return;buildReport(state.result);download('hengheng_numbering_report_v2_9.txt',state.lastReport,'text/plain')}
function exportJson(){if(!state.result)return;download('hengheng_numbering_plan_v2_9.json',JSON.stringify({version:'2.8',returnTarget:state.returnTarget,riskLevel:state.riskLevel,amount:state.amount,seed:state.seed,toggles:state.toggles,result:state.result},null,2),'application/json')}
function download(name,text,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function saveSession(){localStorage.setItem('hengheng_v29',JSON.stringify({returnTarget:state.returnTarget,riskLevel:state.riskLevel,amount:state.amount,seed:state.seed,toggles:state.toggles,custom:state.custom,exclude:state.exclude,hist:state.hist}));toast('Session saved')}
function loadSession(){let s=localStorage.getItem('hengheng_v29');if(!s)return toast('No saved session');Object.assign(state,JSON.parse(s));renderAll();toast('Session loaded')}
function shareConfig(){let data=btoa(unescape(encodeURIComponent(JSON.stringify({r:state.returnTarget,k:state.riskLevel,a:state.amount,s:state.seed,t:state.toggles,c:state.custom,x:state.exclude}))));let url=location.origin+location.pathname+'#cfg='+data;navigator.clipboard?.writeText(url);toast('Share URL copied')}
function loadConfig(){let m=location.hash.match(/cfg=([^&]+)/);if(m){try{let o=JSON.parse(decodeURIComponent(escape(atob(m[1]))));state.returnTarget=o.r;state.riskLevel=o.k;state.amount=o.a||'';state.seed=o.s||state.seed;state.toggles={...state.toggles,...(o.t||{})};state.custom=o.c||'';state.exclude=o.x||'';state.step=state.amount?2:0;toast('Config loaded')}catch(e){}}}
function resetData(){state.hist={loaded:false,counts:{},rawCount:0};renderAll();toast('Hist500 reset')}
$('#histFile').addEventListener('change',e=>{let f=e.target.files[0];if(!f)return;let rd=new FileReader();rd.onload=()=>{tokenizeHist(String(rd.result||''));renderAll();toast('Hist500 imported: '+state.hist.rawCount+' numbers')};rd.readAsText(f)});
document.addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(isTypingField()){if(e.key==='Escape'){e.preventDefault();document.activeElement.blur();toast('Input closed')}if(document.activeElement?.id==='amountInput'&&k==='enter'){e.preventDefault();generate()}return}if(['arrowup','arrowdown','enter'].includes(k))e.preventDefault();if(state.step===0||state.step===1){if(k==='arrowdown')state.select=(state.select+1)%3;if(k==='arrowup')state.select=(state.select+2)%3;if(['1','2','3'].includes(k)){state.select=Number(k)-1;confirmStep()}if(k==='enter')confirmStep();renderAll()}else if(state.step===2){if(k==='enter')generate()}if(k==='b')back();if(k==='r'){state.seed=String(Date.now()).slice(-8);if(state.amount)generate(true);else renderAll()}if(k==='d'){state.tab='ledger';state.step=3;renderAll()}if(k==='c')copyReport();if(k==='e')exportTxt();if(k==='p')window.print();if(k==='n')newGame();});
loadConfig();renderAll();
</script>
</body>
</html>
